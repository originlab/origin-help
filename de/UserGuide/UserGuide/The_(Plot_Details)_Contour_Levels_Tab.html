<h1 class="firstHeading">Die Registerkarte Konturebenen (Details Zeichnung)</h1><p class='urlname' style='display: none'>PD-Dialog-ContourLevels-Tab</p>
<p>Diese Registerkarte kann verwendet werden, um die Konturebenen eines <a href="../../UserGuide/UserGuide/Overlaid_Contour_Plot.html" title="UserGuide:Overlaid Contour Plot">&uuml;berlagerten Konturdiagramms</a> benutzerdefiniert anzupassen.</p>
<dl><dd><a  class="image"><img alt="The (Plot Details) Contour Levels Tab 01.png" src="../images/The_(Plot_Details)_Contour_Levels_Tab/The__28Plot_Details_29_Contour_Levels_Tab_01.png" width="469"  /></a></dd></dl>
<p>Sie k&ouml;nnen die <b>tiefen</b> und <b>hohen</b> Konturebenen der aktuellen Zeichnungen  &auml;ndern.</p>
