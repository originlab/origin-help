<h1 class="firstHeading">9.3.7.28 The (Plot Details) Contour Levels Tab</h1><p class='urlname' style='display: none'>PD-Dialog-ContourLevels-Tab</p>
<p>This tab can be used to customize the contour levels of an <a href="../../UserGuide/UserGuide/Overlaid_Contour_Plot.html" title="UserGuide:Overlaid Contour Plot">Overlaid Contour plot</a>.
</p>
<dl><dd><a  class="image"><img alt="The (Plot Details) Contour Levels Tab 01.png" src="../images/The_(Plot_Details)_Contour_Levels_Tab/The__28Plot_Details_29_Contour_Levels_Tab_01.png?v=0" width="469"  /></a></dd></dl>
<p>You can change the <b>Low</b> and <b>High</b> contour levels of current plots.
</p>
