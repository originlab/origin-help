<h1 class="firstHeading">(作図の詳細)「等高線」タブ</h1><p class='urlname' style='display: none'>PD-Dialog-ContourLines-Tab</p>
<p>このタブを使用して、<a href="../../UserGuide/UserGuide/Overlaid_Contour_Plot.html" title="ユーザガイド:重ね合わせ等高線プロット">重ね合わせ等高線プロット</a>の等高線をカスタマイズできます。
</p>
<dl><dd><a  class="image"><img alt="The (Plot Details) Contour Lines Tab 01.png" src="../images/The_(Plot_Details)_Contour_Lines_Tab/600px-The__28Plot_Details_29_Contour_Lines_Tab_01.png" width="600"   /></a></dd></dl>
<h3><a name="Color"></a><span class="mw-headline">色</span></h3>
<p>線の色を、個々の等高線またはプロット全体で指定できます。色の選択については、 <a href="../../UserGuide/UserGuide/Customizing_Data_Plot_Colors.html" title="ユーザガイド：データプロットの色を編集する">データプロットの色を編集する</a> を参照してください。
</p>
<h3><a name="Style"></a><span class="mw-headline">スタイル</span></h3>
<p>低および高レベルの等高線の線スタイルを選択できます。デフォルトでは、低レベルの等高線は<b>実線</b>で、高レベルの等高線は<b>破線</b>です。
</p>
<h3><a name="Width"></a><span class="mw-headline">幅</span></h3>
<p>等高線の線幅を指定します。
</p>
